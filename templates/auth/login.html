{% extends "base.html" %}
{% block title %}{{ T.login_title }}{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>{{ T.login_title }}</h1>
    <p class="sub">{{ T.login_sub }}</p>

    <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input class="form-control" type="text" name="username" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">{{ T.login_password }}</label>
        <input class="form-control" type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:.5rem;">
        {{ T.login_btn }}
      </button>
    </form>

    <div style="display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--text-muted);font-size:.85rem;">
      <span style="flex:1;height:1px;background:var(--border);"></span> or <span style="flex:1;height:1px;background:var(--border);"></span>
    </div>
    <a href="{% url 'login_phone' %}" class="btn btn-outline btn-block btn-lg">📱 Log in with phone (OTP)</a>

    <p class="auth-footer">
      {{ T.login_no_account }}
      <a href="{% url 'register' %}">{{ T.login_signup }}</a>
    </p>
  </div>
</div>
{% endblock %}
