{% extends "base.html" %}
{% block title %}Verify your email{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:440px;text-align:center;">
    <div style="font-size:2.5rem;">📧</div>
    <h1>Verify your email</h1>
    <p class="sub">We sent a 6-digit code to<br><strong>{{ email }}</strong></p>

    <form method="post" action="{% url 'verify_email' %}">
      {% csrf_token %}
      <div class="form-group">
        <input class="form-control" type="text" name="code" inputmode="numeric" maxlength="6"
               pattern="[0-9]{6}" placeholder="••••••" required autofocus
               style="text-align:center;font-size:1.6rem;letter-spacing:.6rem;">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Verify &amp; Continue</button>
    </form>

    <form method="post" action="{% url 'verify_email' %}" style="margin-top:1rem;">
      {% csrf_token %}
      <input type="hidden" name="action" value="resend">
      <button type="submit" class="btn btn-ghost btn-block">Didn’t get it? Resend code</button>
    </form>

    <p class="auth-footer">
      Wrong address? <a href="{% url 'register' %}">Start over</a>
    </p>
  </div>
</div>
{% endblock %}
