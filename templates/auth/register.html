{% extends "base.html" %}
{% block title %}{{ T.register_title }}{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:500px;">
    <h1>{{ T.register_title }}</h1>
    <p class="sub">{{ T.register_sub }}</p>

    <form method="post" action="{% url 'register' %}" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">First name</label>
          <input class="form-control" type="text" name="first_name" required value="{{ form_data.first_name|default:'' }}" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label class="form-label">Last name</label>
          <input class="form-control" type="text" name="last_name" required value="{{ form_data.last_name|default:'' }}" autocomplete="family-name">
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">{{ T.register_username }}</label>
          <input class="form-control" type="text" name="username" required value="{{ form_data.username|default:'' }}" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">{{ T.register_email }}</label>
          <input class="form-control" type="email" name="email" required value="{{ form_data.email|default:'' }}" autocomplete="email">
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Phone number</label>
          <input class="form-control" type="tel" name="phone_number" required value="{{ form_data.phone_number|default:'' }}" placeholder="+233…" autocomplete="tel">
        </div>
        <div class="form-group">
          <label class="form-label">Date of birth</label>
          <input class="form-control" type="date" name="date_of_birth" required value="{{ form_data.date_of_birth|default:'' }}" max="{{ today }}">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Profile photo <span style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
        <input class="form-control" type="file" name="profile_photo" accept="image/*">
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">{{ T.register_pw1 }}</label>
          <input class="form-control" type="password" name="password1" required autocomplete="new-password" minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label">{{ T.register_pw2 }}</label>
          <input class="form-control" type="password" name="password2" required autocomplete="new-password">
        </div>
      </div>
      <p class="form-hint">Minimum 8 characters.</p>

      <div class="form-group" style="margin-top:.5rem;">
        <label style="display:flex;align-items:flex-start;gap:.6rem;cursor:pointer;font-size:.9rem;">
          <input type="checkbox" name="terms_accepted" value="1" required style="margin-top:.2rem;"
                 {% if form_data.terms_accepted %}checked{% endif %}>
          <span>
            I have read and accept the
            <a href="{% url 'privacy_policy' %}" target="_blank" style="color:var(--orange);">Privacy Policy</a>
            and
            <a href="{% url 'terms' %}" target="_blank" style="color:var(--orange);">Terms of Service</a>.
          </span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:1rem;">
        {{ T.register_btn }}
      </button>
    </form>

    <p class="auth-footer">
      {{ T.register_have_account }}
      <a href="{% url 'login' %}">{{ T.register_login }}</a>
    </p>
  </div>
</div>

{% endblock %}
